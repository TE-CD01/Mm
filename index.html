<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณเงินเดือน & OT (Base 8 Hours)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0ea5e9;
            --bg: #f8fafc;
            --card: #ffffff;
            --sunday: #fff1f2;
            --sunday-text: #be123c;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: #334155;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .header-card {
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border-top: 6px solid var(--accent);
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.9rem; font-weight: 700; color: #475569; }
        
        input {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .info-panel {
            background: #f0f9ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid #bae6fd;
            font-size: 0.9rem;
        }

        .table-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .table-responsive { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 800px; }

        th { background: #f8fafc; padding: 15px; border-bottom: 2px solid #e2e8f0; font-size: 0.85rem; color: #64748b; }

        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        tr.sunday { background-color: var(--sunday); }
        tr.sunday td:nth-child(2) { color: var(--sunday-text); font-weight: bold; }

        select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.9rem;
        }

        .row-extra { font-weight: 700; color: #0369a1; }

        .footer-summary {
            background: var(--primary);
            color: white;
            padding: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            border-radius: 0 0 16px 16px;
        }

        .summary-item { display: flex; flex-direction: column; }
        .summary-label { font-size: 0.85rem; opacity: 0.7; margin-bottom: 5px; }
        .summary-value { font-size: 1.3rem; font-weight: 700; }
        .highlight { color: #38bdf8; font-size: 1.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h2 style="margin:0 0 20px 0;">💰 คำนวณรายได้สุทธิ (ฐานหาร 8)</h2>
        <div class="config-grid">
            <div class="form-group">
                <label>เงินเดือนพื้นฐาน (บาท)</label>
                <input type="number" id="baseSalary" value="20000" oninput="calculateTotal()">
            </div>
            <div class="form-group">
                <label>เลือกเดือนที่ต้องการ</label>
                <input type="month" id="monthPicker" onchange="generateTable()">
            </div>
            <div class="form-group">
                <label>ค่าจ้างต่อชั่วโมง (บาท)</label>
                <input type="text" id="hourlyRateDisplay" disabled style="background:#f1f5f9; border:none; font-weight:bold;">
            </div>
        </div>
        <div class="info-panel">
            <span>🔹 <b>สูตรคำนวณ:</b> (เงินเดือน / 30) / 8</span>
            <span>🔹 <b>ชั่วโมงงานปกติ:</b> 8.75 ชม. (07:40 - 17:25)</span>
            <span>🔹 <b>ชั่วโมง OT:</b> 2.00 ชม. (17:50 - 19:50)</span>
        </div>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>วันที่</th>
                        <th>วัน</th>
                        <th>ค่าแรงพิเศษ (บวกเพิ่ม)</th>
                        <th>ค่า OT (บวกเพิ่ม)</th>
                        <th>ยอดรวมพิเศษ (บาท)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="footer-summary">
            <div class="summary-item">
                <span class="summary-label">เงินเดือนพื้นฐาน:</span>
                <span id="displayBase" class="summary-value">0.00</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">รวมเงินพิเศษ + OT:</span>
                <span id="displayExtra" class="summary-value" style="color:#38bdf8;">+ 0.00</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">รายรับสุทธิทั้งสิ้น:</span>
                <span id="grandTotal" class="summary-value highlight">0.00</span>
            </div>
        </div>
    </div>
</div>

<script>
    const daysTh = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
    const WORK_HOURS_ACTUAL = 8.75; // เวลาทำงานจริง
    const OT_HOURS_ACTUAL = 2;      // เวลา OT จริง
    const BASE_DIVISOR_HOURS = 8;   // ฐานชั่วโมงที่ใช้หารตามกฎหมาย

    document.getElementById('monthPicker').value = new Date().toISOString().substring(0, 7);

    function generateTable() {
        const monthVal = document.getElementById('monthPicker').value;
        const [year, month] = monthVal.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        for (let d = 1; d <= daysInMonth; d++) {
            const dateObj = new Date(year, month - 1, d);
            const dayName = daysTh[dateObj.getDay()];
            const isSunday = dateObj.getDay() === 0;

            const tr = document.createElement('tr');
            if (isSunday) tr.className = 'sunday';

            tr.innerHTML = `
                <td>${d}</td>
                <td>${dayName}</td>
                <td>
                    <select class="work-rate" onchange="calculateTotal()">
                        <option value="0" selected>วันทำงานปกติ</option>
                        <option value="1">วันหยุด (บวก 1 แรง)</option>
                        <option value="1.5">วันหยุด (บวก 1.5 แรง)</option>
                        <option value="2">วันหยุด (บวก 2 แรง)</option>
                        <option value="3">วันหยุด (บวก 3 แรง)</option>
                    </select>
                </td>
                <td>
                    <select class="ot-rate" onchange="calculateTotal()">
                        <option value="0" selected>ไม่มี OT</option>
                        <option value="1">OT 1 เท่า</option>
                        <option value="1.5">OT 1.5 เท่า</option>
                        <option value="2">OT 2 เท่า</option>
                        <option value="3">OT 3 เท่า</option>
                    </select>
                </td>
                <td class="row-extra">0.00</td>
            `;
            tbody.appendChild(tr);
        }
        calculateTotal();
    }

    function calculateTotal() {
        const baseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
        
        // --- สูตรที่แก้ไข: หาร 30 แล้วหาร 8 ---
        const dailyRate = baseSalary / 30;
        const hourlyRate = dailyRate / BASE_DIVISOR_HOURS;
        
        document.getElementById('hourlyRateDisplay').value = hourlyRate.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

        const rows = document.querySelectorAll('#tableBody tr');
        let totalExtra = 0;

        rows.forEach(row => {
            const workMult = parseFloat(row.querySelector('.work-rate').value);
            const otMult = parseFloat(row.querySelector('.ot-rate').value);
            
            // คำนวณเงินพิเศษวันหยุด: ใช้ชั่วโมงทำงานจริง (8.75) คูณฐานชั่วโมงที่ได้ (hourlyRate)
            const extraWork = WORK_HOURS_ACTUAL * hourlyRate * workMult;
            
            // คำนวณ OT: ใช้ชั่วโมง OT จริง (2) คูณฐานชั่วโมงที่ได้ คูณตัวคูณ OT
            const extraOT = OT_HOURS_ACTUAL * hourlyRate * otMult;
            
            const dayExtra = extraWork + extraOT;
            row.querySelector('.row-extra').innerText = dayExtra.toLocaleString(undefined, {minimumFractionDigits: 2});
            totalExtra += dayExtra;
        });

        const grandTotal = baseSalary + totalExtra;

        document.getElementById('displayBase').innerText = baseSalary.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('displayExtra').innerText = "+ " + totalExtra.toLocaleString(undefined, {minimumFractionDigits: 2});
        document.getElementById('grandTotal').innerText = grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    generateTable();
</script>

</body>
</html>
